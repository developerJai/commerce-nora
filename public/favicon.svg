      <stop offset="0%" style="stop-color:#1a1410"/>
      <stop offset="100%" style="stop-color:#2d1f18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a853"/>
      <stop offset="50%" style="stop-color:#f0d48a"/>
      <stop offset="100%" style="stop-color:#c49a3c"/>
