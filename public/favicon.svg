<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#881337;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be123c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="50" cy="50" r="48" fill="url(#brandGradient)"/>
  
  <!-- Stylized "N" letter for Noralooks -->
  <path d="M 30 30 L 30 70 L 35 70 L 35 42 L 60 70 L 65 70 L 65 30 L 60 30 L 60 58 L 35 30 Z" 
        fill="#fef2f2" 
        stroke="#fbbf24" 
        stroke-width="0.5"/>
  
  <!-- Decorative jewel/diamond accent -->
  <path d="M 70 35 L 75 40 L 70 45 L 65 40 Z" 
        fill="#fbbf24" 
        opacity="0.9"/>
</svg>
